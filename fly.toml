app = "next-boris"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  DATABASE_PATH = "/data/next.db"
  FRONTEND_DIR = "/app/frontend"
  TZ = "Asia/Shanghai"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "next_data"
  destination = "/data"

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"
