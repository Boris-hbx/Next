<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>冰晶抽屉效果 Demo v4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    overflow: hidden;
}

.fake-content {
    padding: 60px 20px 120px;
    height: 100vh;
    overflow-y: auto;
}
.fake-content h2 { font-size: 18px; margin-bottom: 16px; color: #8b949e; }
.fake-task {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
    font-size: 14px; display: flex; align-items: center; gap: 12px;
}
.fake-checkbox { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; flex-shrink: 0; }
.fake-badge { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(102,126,234,0.15); color: #667eea; }

/* 底部导航 */
.fake-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
    background: rgba(13,17,23,0.95); border-top: 1px solid rgba(255,255,255,0.08);
    display: grid; grid-template-columns: repeat(5,1fr);
    align-items: center; justify-items: center; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #8b949e; font-size: 11px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.nav-btn .icon { font-size: 20px; }
.nav-btn.abao-btn .icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-top: -20px;
    box-shadow: 0 4px 12px rgba(102,126,234,0.35); color: #fff;
}

/* ========== 遮罩 ========== */
.overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.1); z-index: 999; opacity: 0; transition: opacity 0.4s ease;
}
.overlay.open { display: block; opacity: 1; }

/* ========== 冰晶抽屉面板 ========== */
.ice-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 62vh; z-index: 1000;
    border-radius: 20px 20px 0 0; overflow: hidden;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.18); border-bottom: none;
    transform: translateY(100%); opacity: 0.2;
    transition: transform 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.45s ease;
    display: flex; flex-direction: column;
}
.ice-panel.open { transform: translateY(0); opacity: 1; }
.ice-panel.closing {
    transform: translateY(100%); opacity: 0.15;
    transition: transform 0.35s cubic-bezier(0.4,0,1,1), opacity 0.15s ease;
}

/* 边缘折射 */
.refract-edge { position: absolute; top: 0; bottom: 0; width: 30px; z-index: 1; pointer-events: none; backdrop-filter: blur(40px) saturate(1.6); -webkit-backdrop-filter: blur(40px) saturate(1.6); }
.refract-edge.left { left: 0; border-radius: 20px 0 0 0; background: linear-gradient(90deg, rgba(255,255,255,0.07), transparent); mask-image: linear-gradient(90deg, black, transparent); -webkit-mask-image: linear-gradient(90deg, black, transparent); }
.refract-edge.right { right: 0; border-radius: 0 20px 0 0; background: linear-gradient(-90deg, rgba(255,255,255,0.07), transparent); mask-image: linear-gradient(-90deg, black, transparent); -webkit-mask-image: linear-gradient(-90deg, black, transparent); }
.refract-edge.top { top: 0; left: 0; right: 0; width: auto; height: 20px; bottom: auto; border-radius: 20px 20px 0 0; background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent); mask-image: linear-gradient(180deg, black, transparent); -webkit-mask-image: linear-gradient(180deg, black, transparent); backdrop-filter: blur(44px) saturate(1.8); -webkit-backdrop-filter: blur(44px) saturate(1.8); }

/* 顶部高光 */
.ice-panel > .ice-highlight {
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.6) 25%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0.6) 75%, transparent 95%);
    z-index: 3; pointer-events: none;
}

/* 反光扫过 */
.ice-panel > .ice-sheen {
    position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(105deg, transparent 0%, transparent 35%, rgba(255,255,255,0.06) 40%, rgba(255,255,255,0.12) 45%, rgba(255,255,255,0.06) 50%, transparent 55%, transparent 100%);
    background-size: 250% 100%;
    animation: sheen-sweep 6s ease-in-out infinite; animation-play-state: paused;
    pointer-events: none; z-index: 2;
}
.ice-panel.open > .ice-sheen { animation-play-state: running; }
@keyframes sheen-sweep { 0% { background-position: 150% 0; } 100% { background-position: -50% 0; } }

/* 水纹 */
.ice-panel > .ice-ripple {
    position: absolute; inset: 0; border-radius: inherit;
    background:
        radial-gradient(ellipse 100% 60% at 15% 20%, rgba(102,126,234,0.13), transparent 60%),
        radial-gradient(ellipse 80% 50% at 80% 50%, rgba(168,85,247,0.10), transparent 60%),
        radial-gradient(ellipse 70% 70% at 40% 85%, rgba(56,189,248,0.08), transparent 60%);
    background-size: 200% 200%, 200% 200%, 200% 200%;
    animation: ice-ripple 8s ease-in-out infinite; animation-play-state: paused;
    pointer-events: none; z-index: 1;
}
.ice-panel.open > .ice-ripple { animation-play-state: running; }
@keyframes ice-ripple {
    0%   { background-position: 0% 0%, 100% 100%, 50% 50%; }
    25%  { background-position: 40% 30%, 60% 30%, 15% 75%; }
    50%  { background-position: 70% 60%, 20% 65%, 85% 25%; }
    75%  { background-position: 30% 80%, 75% 15%, 45% 60%; }
    100% { background-position: 0% 0%, 100% 100%, 50% 50%; }
}

/* --- 拖拽条（含微标识） --- */
.drag-bar {
    display: flex; align-items: center;
    padding: 8px 12px 6px;
    flex-shrink: 0; position: relative; z-index: 5;
}

/* 左侧微标识 */
.drag-bar .bar-identity {
    display: flex; align-items: center; gap: 5px;
    flex-shrink: 0;
}
.drag-bar .bar-identity .mini-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; line-height: 1;
}
.drag-bar .bar-identity .mini-name {
    font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 500;
}

/* 中间拖拽手柄 */
.drag-bar .bar-handle {
    flex: 1; display: flex; justify-content: center;
}
.drag-bar .bar-handle span {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.25);
}

/* 右侧关闭 */
.drag-bar .close-btn {
    background: none; border: none; flex-shrink: 0;
    color: rgba(255,255,255,0.3); font-size: 18px;
    cursor: pointer; padding: 2px 6px; border-radius: 6px;
}
.drag-bar .close-btn:hover { color: rgba(255,255,255,0.6); }

/* --- 消息区 --- */
.messages {
    flex: 1; overflow-y: auto;
    padding: 6px 16px 12px;
    display: flex; flex-direction: column; gap: 10px;
    position: relative; z-index: 5;
}

/* 消息行：头像 + 气泡 */
.msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    max-width: 90%;
}
.msg-row.assistant { align-self: flex-start; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

/* 消息头像 */
.msg-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; line-height: 1;
}
.msg-row.assistant .msg-avatar {
    background: linear-gradient(135deg, #667eea, #764ba2);
}
.msg-row.user .msg-avatar {
    background: linear-gradient(135deg, #3498db, #2980b9);
    font-size: 11px; font-weight: 600; color: white;
}

/* 气泡 */
.msg-bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.5;
}
.msg-row.assistant .msg-bubble {
    background: rgba(255,255,255,0.10);
    border-bottom-left-radius: 4px;
}
.msg-row.user .msg-bubble {
    background: linear-gradient(135deg, rgba(102,126,234,0.6), rgba(118,75,162,0.6));
    border-bottom-right-radius: 4px;
}

/* --- 输入区 --- */
.input-area {
    display: flex; padding: 8px 12px; gap: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0; position: relative; z-index: 5;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0));
}
.input-area input {
    flex: 1; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 10px 16px;
    color: #e6edf3; font-size: 15px; outline: none;
}
.input-area input::placeholder { color: rgba(255,255,255,0.35); }
.send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(102,126,234,0.5), rgba(118,75,162,0.5));
    border: 1px solid rgba(255,255,255,0.15);
    color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}

.demo-hint {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(102,126,234,0.15); color: #667eea;
    padding: 8px 16px; border-radius: 20px; font-size: 13px;
    z-index: 50; white-space: nowrap;
}
</style>
</head>
<body>

<div class="demo-hint">点击底部🐾按钮体验冰晶抽屉效果</div>

<div class="fake-content">
    <h2>Todo · 今天</h2>
    <div class="fake-task"><div class="fake-checkbox"></div>完成项目周报<span class="fake-badge">重要</span></div>
    <div class="fake-task"><div class="fake-checkbox"></div>Review 前端 PR<span class="fake-badge">紧急</span></div>
    <div class="fake-task"><div class="fake-checkbox"></div>准备明天的演示材料</div>
    <div class="fake-task"><div class="fake-checkbox"></div>修复登录页 Bug<span class="fake-badge">紧急</span></div>
    <div class="fake-task"><div class="fake-checkbox"></div>整理文档结构</div>
    <div class="fake-task"><div class="fake-checkbox"></div>和设计师对齐新需求</div>
    <div class="fake-task"><div class="fake-checkbox"></div>更新依赖版本</div>
    <div class="fake-task"><div class="fake-checkbox"></div>写单元测试</div>
    <div class="fake-task"><div class="fake-checkbox"></div>部署到生产环境<span class="fake-badge">重要</span></div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="ice-panel" id="panel">
    <div class="refract-edge left"></div>
    <div class="refract-edge right"></div>
    <div class="refract-edge top"></div>
    <div class="ice-highlight"></div>
    <div class="ice-sheen"></div>
    <div class="ice-ripple"></div>

    <div class="drag-bar">
        <div class="bar-identity">
            <div class="mini-avatar">🐾</div>
            <span class="mini-name">阿宝</span>
        </div>
        <div class="bar-handle"><span></span></div>
        <button class="close-btn" onclick="closePanel()">✕</button>
    </div>

    <div class="messages">
        <div class="msg-row assistant">
            <div class="msg-avatar">🐾</div>
            <div class="msg-bubble">有什么事？说吧。</div>
        </div>
        <div class="msg-row user">
            <div class="msg-avatar">B</div>
            <div class="msg-bubble">帮我看看今天有哪些紧急任务</div>
        </div>
        <div class="msg-row assistant">
            <div class="msg-avatar">🐾</div>
            <div class="msg-bubble">你今天有 2 个紧急任务：<br>1. Review 前端 PR<br>2. 修复登录页 Bug<br><br>建议先处理 Bug，再 Review PR。</div>
        </div>
        <div class="msg-row user">
            <div class="msg-avatar">B</div>
            <div class="msg-bubble">好的，先修 Bug</div>
        </div>
        <div class="msg-row assistant">
            <div class="msg-avatar">🐾</div>
            <div class="msg-bubble">👍 加油！搞完了告诉我。</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" placeholder="对阿宝说点什么...">
        <button class="send-btn">↑</button>
    </div>
</div>

<div class="fake-nav">
    <div class="nav-btn"><span class="icon">☑</span><span>Todo</span></div>
    <div class="nav-btn"><span class="icon">🔄</span><span>例行</span></div>
    <div class="nav-btn abao-btn" onclick="togglePanel()"><span class="icon">🐾</span><span>阿宝</span></div>
    <div class="nav-btn"><span class="icon">📖</span><span>英语</span></div>
    <div class="nav-btn"><span class="icon">📥</span><span>潘多拉</span></div>
</div>

<script>
var panel = document.getElementById('panel');
var overlay = document.getElementById('overlay');
var isOpen = false;

function togglePanel() { isOpen ? closePanel() : openPanel(); }

function openPanel() {
    isOpen = true;
    panel.classList.remove('closing');
    void panel.offsetHeight;
    panel.classList.add('open');
    overlay.classList.add('open');
}

function closePanel() {
    if (!isOpen) return;
    isOpen = false;
    panel.classList.add('closing');
    panel.classList.remove('open');
    overlay.classList.remove('open');
    setTimeout(function() { panel.classList.remove('closing'); }, 400);
}

var touchStartY = 0, dragging = false;
panel.addEventListener('touchstart', function(e) {
    if (e.target.closest('.drag-bar')) {
        touchStartY = e.touches[0].clientY;
        dragging = true;
        panel.style.transition = 'none';
    }
}, { passive: true });
panel.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    var dy = e.touches[0].clientY - touchStartY;
    if (dy > 0) {
        panel.style.transform = 'translateY(' + dy + 'px)';
        panel.style.opacity = Math.max(0.15, 1 - dy / 300);
    }
}, { passive: true });
panel.addEventListener('touchend', function() {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';
    var dy = parseInt(panel.style.transform.replace(/[^0-9.-]/g,'')) || 0;
    if (dy > 80) { closePanel(); }
    else { panel.style.transform = ''; panel.style.opacity = ''; panel.classList.add('open'); }
});
</script>
</body>
</html>
