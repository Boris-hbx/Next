<!DOCTYPE html>
<html lang="zh-CN" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <title>Next - 登录</title>
    <link rel="stylesheet" href="assets/css/base.css?v=20260223a">
    <link rel="manifest" href="assets/manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <script>
    (function() {
        var theme = localStorage.getItem('theme');
        if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary, #0d1117);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary, #e6edf3);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 48px 36px;
            background: var(--bg-secondary, #161b22);
            border: 1px solid var(--border-color, rgba(255,255,255,0.08));
            border-radius: 16px;
            margin: 16px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .logo-n {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary-color, #667eea), var(--primary-hover, #5a6fd6));
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .login-logo h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary, #e6edf3);
        }
        .login-logo p {
            font-size: 13px;
            color: var(--text-secondary, #8b949e);
            margin-top: 4px;
        }
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.08));
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary, #8b949e);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--primary-color, #667eea);
            border-bottom-color: var(--primary-color, #667eea);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary, #8b949e);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary, #0d1117);
            border: 1px solid var(--border-color, rgba(255,255,255,0.12));
            border-radius: 8px;
            color: var(--text-primary, #e6edf3);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary-color, #667eea);
        }
        .form-group input::placeholder {
            color: var(--text-muted, #484f58);
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-color, #667eea), var(--primary-hover, #5a6fd6));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            color: #f85149;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }
        .extra-field { display: none; }
        .extra-field.show { display: block; }
        .password-hint {
            display: none;
            font-size: 12px;
            color: var(--text-secondary, #8b949e);
            background: rgba(251, 146, 60, 0.08);
            border-left: 3px solid #fb923c;
            padding: 8px 12px;
            border-radius: 0 6px 6px 0;
            margin-top: 8px;
            line-height: 1.5;
        }
        .password-hint.show { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-n">N</div>
            <h1>Next</h1>
            <p>Focus on the Right Thing</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">登录</button>
            <button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">注册</button>
        </div>

        <form id="auth-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="3-20 个字符" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="至少 8 个字符" autocomplete="current-password" required>
            </div>
            <div class="password-hint" id="password-hint">请务必牢记密码。"找回密码"功能尚在开发中，如忘记密码将暂时无法找回，管理员也无法查看。</div>
            <div class="form-group extra-field" id="display-name-group">
                <label for="display-name">显示名称 (可选)</label>
                <input type="text" id="display-name" placeholder="你的昵称">
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">登录</button>
            <div class="error-msg" id="error-msg"></div>
        </form>
    </div>

    <script>
    var authMode = 'login';

    // Check if already logged in
    (async function() {
        try {
            var resp = await fetch('/api/auth/me', { credentials: 'same-origin' });
            if (resp.ok) {
                window.location.href = '/';
                return;
            }
        } catch(e) {}
    })();

    function switchAuthTab(mode) {
        authMode = mode;
        document.getElementById('tab-login').classList.toggle('active', mode === 'login');
        document.getElementById('tab-register').classList.toggle('active', mode === 'register');
        document.getElementById('display-name-group').classList.toggle('show', mode === 'register');
        document.getElementById('password-hint').classList.toggle('show', mode === 'register');
        document.getElementById('submit-btn').textContent = mode === 'login' ? '登录' : '注册';
        document.getElementById('password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
        document.getElementById('error-msg').textContent = '';
    }

    async function handleSubmit(e) {
        e.preventDefault();
        var btn = document.getElementById('submit-btn');
        var errEl = document.getElementById('error-msg');
        errEl.textContent = '';
        btn.disabled = true;

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        try {
            var body = { username: username, password: password };
            if (authMode === 'register') {
                var displayName = document.getElementById('display-name').value.trim();
                if (displayName) body.display_name = displayName;
            }

            var resp = await fetch('/api/auth/' + authMode, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                credentials: 'same-origin'
            });

            var data = await resp.json();

            if (data.success) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', data.user.username);
                if (data.user.display_name) {
                    localStorage.setItem('displayName', data.user.display_name);
                }
                window.location.href = '/';
            } else {
                errEl.textContent = data.message || '操作失败';
            }
        } catch(err) {
            errEl.textContent = '网络错误，请重试';
        } finally {
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
