<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="fg" x1="100" y1="100" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="15%" stop-color="#e0e7ff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- E4 特色：均匀笔画 N + 十字星芒 -->
  <path d="
    M 124,396
    L 124,116
    L 166,116
    L 346,340
    L 346,116
    L 388,116
    L 388,396
    L 346,396
    L 166,172
    L 166,396
    Z
  " fill="url(#fg)"/>

  <!-- Star flare at top-right corner -->
  <circle cx="388" cy="116" r="64" fill="url(#glow4)"/>
  <!-- Cross flare arms -->
  <ellipse cx="388" cy="116" rx="32" ry="2" fill="#e0e7ff" opacity="0.55" filter="url(#blur4)"/>
  <ellipse cx="388" cy="116" rx="2" ry="32" fill="#e0e7ff" opacity="0.55" filter="url(#blur4)"/>
  <!-- Bright core -->
  <circle cx="388" cy="116" r="5" fill="white" opacity="0.95"/>
</svg>